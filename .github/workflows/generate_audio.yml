name: Generate Audio Files

on:
  workflow_dispatch:
  push:
    paths:
      - 'audio_manifest.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate audio files
        run: python generate_audio.py

      - name: Commit audio files to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/
          if git diff --staged --quiet; then
            echo "No new audio files to commit."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add $COUNT generated audio files [skip ci]"
            git push
          fi
